<svg viewBox="0 0 1320 1180" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <title>MedLynq MVP scope</title>
  <style>
    .t{fill:#1f1f1f;} .t2{fill:#555;} .t3{fill:#888;} .inv{fill:#fff;}
    .card{fill:#fff;stroke:#999;stroke-width:1.2;}
    .in{fill:#e8f5ee;stroke:#1f8a4c;stroke-width:1.6;}
    .out{fill:#f6f6f4;stroke:#bbb;stroke-width:1;stroke-dasharray:4 3;}
    .accent{fill:#c96442;}
    .accentSoft{fill:#fbeee8;stroke:#c96442;stroke-width:1.4;}
    .lane{fill:#fafafa;stroke:#d4d4d4;stroke-width:1;}
    .green{fill:#1f8a4c;}
    .lineA{stroke:#c96442;stroke-width:2;fill:none;}
    .title{font-size:18px;font-weight:700;}
    .lbl{font-size:12px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;fill:#555;}
    .h{font-size:13px;font-weight:600;}
    .sub{font-size:11px;}
    .tag{font-size:10px;}
    .micro{font-size:9px;}
    .big{font-size:16px;font-weight:700;}
  </style>
  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#c96442"/></marker></defs>
  <rect width="1320" height="1180" fill="#fff"/>
  <text x="40" y="40" class="title t">MedLynq MVP — the smallest valuable thing</text>
  <text x="40" y="60" class="sub t2">One screen. Paste query → get document + page + ready-to-send packet. Everything else waits.</text>
  <text x="40" y="100" class="lbl">The MVP user flow · 4 steps · &lt; 30 seconds</text>
  <g transform="translate(40,118)"><rect class="in" width="290" height="120" rx="8"/><text x="14" y="26" class="big t">1 · Upload docs (once)</text><text x="14" y="48" class="sub t2">Drag-drop PDFs + JPEGs into</text><text x="14" y="62" class="sub t2">a Patient Folder.</text><text x="14" y="80" class="sub t2">Background OCR + Evidence Index.</text><text x="14" y="98" class="sub t2">~2 min for 20 docs.</text><text x="14" y="112" class="micro green">Done once per case.</text></g>
  <path class="lineA" d="M330,178 H360" marker-end="url(#a)"/>
  <g transform="translate(360,118)"><rect class="in" width="290" height="120" rx="8"/><text x="14" y="26" class="big t">2 · Paste the query</text><text x="14" y="48" class="sub t2">"PROVIDE POST OP HPE REPORT"</text><text x="14" y="62" class="sub t2">Copy from portal · or take screenshot.</text><text x="14" y="80" class="sub t2">No classification required —</text><text x="14" y="94" class="sub t2">just give Lynq the raw text.</text><text x="14" y="112" class="micro green">2 seconds.</text></g>
  <path class="lineA" d="M650,178 H680" marker-end="url(#a)"/>
  <g transform="translate(680,118)"><rect class="accentSoft" width="290" height="120" rx="8"/><text x="14" y="26" class="big accent">3 · Lynq locates the doc</text><text x="14" y="48" class="sub t2">Evidence Locator returns:</text><text x="14" y="64" class="sub t2">• File: HPE_REPORT_20240615.pdf</text><text x="14" y="78" class="sub t2">• Pages: 2–4</text><text x="14" y="92" class="sub t2">• Confidence: 94%</text><text x="14" y="112" class="micro accent">~5 seconds.</text></g>
  <path class="lineA" d="M970,178 H1000" marker-end="url(#a)"/>
  <g transform="translate(1000,118)"><rect class="in" width="270" height="120" rx="8"/><text x="14" y="26" class="big t">4 · Generate packet</text><text x="14" y="48" class="sub t2">Cover sheet + located doc +</text><text x="14" y="62" class="sub t2">one-paragraph response.</text><text x="14" y="80" class="sub t2">Query_Response_0042.pdf</text><text x="14" y="94" class="sub t2">Clerk downloads, uploads to portal.</text><text x="14" y="112" class="micro green">~10 seconds.</text></g>
  <text x="40" y="278" class="lbl">In scope · MVP (5 modules only)</text>
  <g transform="translate(40,296)"><rect class="lane" width="1240" height="180" rx="8"/>
    <g transform="translate(14,14)"><rect class="in" width="232" height="150" rx="6"/><text x="14" y="22" class="h t">Patient Folder</text><text x="14" y="40" class="sub t2">Container per case</text><text x="14" y="54" class="sub t2">PatientName_MRN</text><text x="14" y="68" class="sub t2">Upload + dedupe</text><text x="14" y="82" class="sub t2">Drag-drop UI</text><text x="14" y="110" class="micro green">Required for Day 1</text><text x="14" y="124" class="micro t2">Build: 1 week</text></g>
    <g transform="translate(258,14)"><rect class="in" width="232" height="150" rx="6"/><text x="14" y="22" class="h t">Document Repository</text><text x="14" y="40" class="sub t2">S3 storage</text><text x="14" y="54" class="sub t2">Original + compressed</text><text x="14" y="68" class="sub t2">Per-doc metadata</text><text x="14" y="82" class="sub t2">Audit log</text><text x="14" y="110" class="micro green">Required for Day 1</text><text x="14" y="124" class="micro t2">Build: 1 week</text></g>
    <g transform="translate(502,14)"><rect class="in" width="232" height="150" rx="6"/><text x="14" y="22" class="h t">Clinical Evidence Index</text><text x="14" y="40" class="sub t2">Page-level OCR</text><text x="14" y="54" class="sub t2">pgvector embeddings</text><text x="14" y="68" class="sub t2">Elasticsearch text</text><text x="14" y="82" class="sub t2">Tag per doc type</text><text x="14" y="110" class="micro accent">The retrieval wedge</text><text x="14" y="124" class="micro t2">Build: 2 weeks</text></g>
    <g transform="translate(746,14)"><rect class="in" width="232" height="150" rx="6"/><text x="14" y="22" class="h t">Document Evidence Locator</text><text x="14" y="40" class="sub t2">Hybrid search</text><text x="14" y="54" class="sub t2">Returns file + page + score</text><text x="14" y="68" class="sub t2">Top-3 candidates</text><text x="14" y="82" class="sub t2">Refuses if no match</text><text x="14" y="110" class="micro accent">The retrieval wedge</text><text x="14" y="124" class="micro t2">Build: 2 weeks</text></g>
    <g transform="translate(990,14)"><rect class="in" width="236" height="150" rx="6"/><text x="14" y="22" class="h t">Query Packet Builder</text><text x="14" y="40" class="sub t2">Cover sheet generator</text><text x="14" y="54" class="sub t2">PDF merge</text><text x="14" y="68" class="sub t2">One-paragraph response</text><text x="14" y="82" class="sub t2">Doctor-editable</text><text x="14" y="110" class="micro accent">The wow moment</text><text x="14" y="124" class="micro t2">Build: 2 weeks</text></g>
  </g>
  <text x="40" y="516" class="lbl">Out of scope · v2 and later (skip everything else)</text>
  <g transform="translate(40,534)"><rect class="lane" width="1240" height="220" rx="8"/>
    <g transform="translate(14,14)"><rect class="out" width="190" height="60" rx="6"/><text x="10" y="22" class="h t3">MedLynq Go mobile</text><text x="10" y="38" class="micro t3">Defer until v2</text><text x="10" y="50" class="micro t3">Web upload covers it</text></g>
    <g transform="translate(214,14)"><rect class="out" width="190" height="60" rx="6"/><text x="10" y="22" class="h t3">Voice notes</text><text x="10" y="38" class="micro t3">Defer until v2</text><text x="10" y="50" class="micro t3">Not blocking the wedge</text></g>
    <g transform="translate(414,14)"><rect class="out" width="190" height="60" rx="6"/><text x="10" y="22" class="h t3">Handwriting → sheet</text><text x="10" y="38" class="micro t3">Defer until v2</text><text x="10" y="50" class="micro t3">OCR PDFs is enough</text></g>
    <g transform="translate(614,14)"><rect class="out" width="190" height="60" rx="6"/><text x="10" y="22" class="h t3">Query classifier (10 types)</text><text x="10" y="38" class="micro t3">Defer until v2</text><text x="10" y="50" class="micro t3">Need labels first</text></g>
    <g transform="translate(814,14)"><rect class="out" width="190" height="60" rx="6"/><text x="10" y="22" class="h t3">Risk scorer / predictor</text><text x="10" y="38" class="micro t3">Defer until v3</text><text x="10" y="50" class="micro t3">Need outcomes first</text></g>
    <g transform="translate(1014,14)"><rect class="out" width="212" height="60" rx="6"/><text x="10" y="22" class="h t3">Doctor co-pilot</text><text x="10" y="38" class="micro t3">Defer until v2</text><text x="10" y="50" class="micro t3">Different sales motion</text></g>
    <g transform="translate(14,84)"><rect class="out" width="190" height="60" rx="6"/><text x="10" y="22" class="h t3">Pre-auth workflow</text><text x="10" y="38" class="micro t3">Defer until v2</text><text x="10" y="50" class="micro t3">Major new surface</text></g>
    <g transform="translate(214,84)"><rect class="out" width="190" height="60" rx="6"/><text x="10" y="22" class="h t3">HIS connector</text><text x="10" y="38" class="micro t3">Defer until v2</text><text x="10" y="50" class="micro t3">Manual upload OK</text></g>
    <g transform="translate(414,84)"><rect class="out" width="190" height="60" rx="6"/><text x="10" y="22" class="h t3">NHCX FHIR mapper</text><text x="10" y="38" class="micro t3">Defer until v3</text><text x="10" y="50" class="micro t3">Pre-mandate · not urgent</text></g>
    <g transform="translate(614,84)"><rect class="out" width="190" height="60" rx="6"/><text x="10" y="22" class="h t3">CFO dashboard</text><text x="10" y="38" class="micro t3">Defer until v2</text><text x="10" y="50" class="micro t3">Need data first</text></g>
    <g transform="translate(814,84)"><rect class="out" width="190" height="60" rx="6"/><text x="10" y="22" class="h t3">Insurer-side mirror</text><text x="10" y="38" class="micro t3">Defer until v3</text><text x="10" y="50" class="micro t3">Two-sided · later</text></g>
    <g transform="translate(1014,84)"><rect class="out" width="212" height="60" rx="6"/><text x="10" y="22" class="h t3">Patient mini-portal</text><text x="10" y="38" class="micro t3">Defer until v3</text><text x="10" y="50" class="micro t3">Not blocking</text></g>
    <g transform="translate(14,154)"><rect class="out" width="190" height="50" rx="6"/><text x="10" y="22" class="h t3">Network intelligence</text><text x="10" y="38" class="micro t3">Defer · needs ≥25 hospitals</text></g>
    <g transform="translate(214,154)"><rect class="out" width="190" height="50" rx="6"/><text x="10" y="22" class="h t3">Benchmarking</text><text x="10" y="38" class="micro t3">Defer · needs network</text></g>
    <g transform="translate(414,154)"><rect class="out" width="190" height="50" rx="6"/><text x="10" y="22" class="h t3">ERP / Tally sync</text><text x="10" y="38" class="micro t3">Defer · CFO-tier feature</text></g>
    <g transform="translate(614,154)"><rect class="out" width="190" height="50" rx="6"/><text x="10" y="22" class="h t3">Empanelment intel</text><text x="10" y="38" class="micro t3">Defer until v2</text></g>
    <g transform="translate(814,154)"><rect class="out" width="190" height="50" rx="6"/><text x="10" y="22" class="h t3">Auditor share link</text><text x="10" y="38" class="micro t3">Defer until v3</text></g>
    <g transform="translate(1014,154)"><rect class="out" width="212" height="50" rx="6"/><text x="10" y="22" class="h t3">Pharmacy + barcode</text><text x="10" y="38" class="micro t3">Defer until v2</text></g>
  </g>
  <text x="40" y="794" class="lbl">Build plan · 10 weeks · 4 people</text>
  <g transform="translate(40,812)"><rect class="lane" width="1240" height="160" rx="8"/>
    <g transform="translate(14,14)"><rect class="card" width="232" height="130" rx="6"/><text x="14" y="22" class="h t">Weeks 1–2</text><text x="14" y="40" class="sub t2">Foundation</text><text x="14" y="58" class="micro t2">• Auth · multi-tenant</text><text x="14" y="72" class="micro t2">• Patient folder CRUD</text><text x="14" y="86" class="micro t2">• Upload + S3 storage</text><text x="14" y="100" class="micro t2">• Postgres schema</text><text x="14" y="114" class="micro green">Goal: drag-drop works</text></g>
    <g transform="translate(258,14)"><rect class="card" width="232" height="130" rx="6"/><text x="14" y="22" class="h t">Weeks 3–4</text><text x="14" y="40" class="sub t2">Evidence Index</text><text x="14" y="58" class="micro t2">• OCR pipeline (worker)</text><text x="14" y="72" class="micro t2">• pgvector embeddings</text><text x="14" y="86" class="micro t2">• Elasticsearch FTS</text><text x="14" y="100" class="micro t2">• Per-doc type classifier</text><text x="14" y="114" class="micro green">Goal: search works</text></g>
    <g transform="translate(502,14)"><rect class="card" width="232" height="130" rx="6"/><text x="14" y="22" class="h t">Weeks 5–6</text><text x="14" y="40" class="sub t2">Locator + Drafter</text><text x="14" y="58" class="micro t2">• Hybrid search ranker</text><text x="14" y="72" class="micro t2">• Top-3 candidates UI</text><text x="14" y="86" class="micro t2">• Response drafter (LLM)</text><text x="14" y="100" class="micro t2">• Refusal logic</text><text x="14" y="114" class="micro green">Goal: paste query → file</text></g>
    <g transform="translate(746,14)"><rect class="card" width="232" height="130" rx="6"/><text x="14" y="22" class="h t">Weeks 7–8</text><text x="14" y="40" class="sub t2">Packet Builder</text><text x="14" y="58" class="micro t2">• Cover page generator</text><text x="14" y="72" class="micro t2">• PDF merger</text><text x="14" y="86" class="micro t2">• Editable preview</text><text x="14" y="100" class="micro t2">• Download + audit log</text><text x="14" y="114" class="micro green">Goal: end-to-end packet</text></g>
    <g transform="translate(990,14)"><rect class="card" width="236" height="130" rx="6"/><text x="14" y="22" class="h t">Weeks 9–10</text><text x="14" y="40" class="sub t2">Pilot ready</text><text x="14" y="58" class="micro t2">• Polish + DPDP audit</text><text x="14" y="72" class="micro t2">• Onboarding script</text><text x="14" y="86" class="micro t2">• Pilot hospital training</text><text x="14" y="100" class="micro t2">• Telemetry dashboard</text><text x="14" y="114" class="micro green">Goal: 1st pilot live</text></g>
  </g>
  <text x="40" y="1000" class="lbl">Team needed</text>
  <g transform="translate(40,1018)"><rect class="card" width="1240" height="80" rx="8"/><text x="14" y="22" class="h t">4 people for 10 weeks</text><text x="14" y="40" class="sub t2">1 full-stack engineer (Next.js + FastAPI) · 1 ML/data engineer (OCR + RAG + Evidence Index) · 1 product/designer (the one screen has to be perfect) · 1 founder for hospital outreach + clerk training</text><text x="14" y="58" class="sub t2">Optional: half-time DevOps for AWS setup in week 1. Budget: ~₹ 8–12 L for the 10 weeks (incl. AWS + LLM costs).</text></g>
  <text x="40" y="1116" class="lbl">Success metrics for the pilot</text>
  <g transform="translate(40,1132)"><rect class="card" width="1240" height="36" rx="8"/><text x="14" y="22" class="sub t2"><tspan class="h accent">North star: time-to-resolve a query.</tspan> Baseline 25–40 min → MVP target &lt; 5 min. Secondary: 80%+ of queries resolved without re-fetching from HIS. Tertiary: ≥ 200 labelled query-response pairs per hospital per month (the moat-building byproduct).</text></g>
</svg>
