name: Build MedLynq app image

# Builds the newer multi-tenant MedLynq app (Next.js + Python OCR sidecar in
# one container, see MedLynq_Handoff/app/Dockerfile) on a GitHub amd64
# runner and pushes it to Azure Container Registry. Same reasoning as
# ocr-image.yml: ACR Tasks (cloud build) is not permitted on this
# subscription and there is no local Docker. The medlynq-app App Service
# (now container-based, replacing the old source/Oryx deploy) pulls this
# image.
#
# Bump the image tag below (v1 -> v2 -> ...) to force a clean pull after
# pushing — App Service does not always re-pull a same-tag image on its own.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'MedLynq_Handoff/app/**'
      - '.github/workflows/app-image.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: MedLynq_Handoff/app
          file: MedLynq_Handoff/app/Dockerfile
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/medlynq-app:v1
