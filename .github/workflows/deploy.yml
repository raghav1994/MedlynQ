name: Deploy MedLynQ to Azure (LEGACY, disabled)

# Deployed the OLDER top-level app/ SOURCE via Azure Oryx build. As of
# 2026-07-10, medlynq-app was switched to a container deployment running the
# newer MedLynq_Handoff/app instead (see app-image.yml) — this workflow's
# target no longer matches what's live, so its push trigger has been
# disabled to stop it clobbering the container config on every push to main.
# Kept as workflow_dispatch-only in case top-level app/ is ever needed again.
#
# Requires these App Service settings (set via Azure CLI / Portal):
#   SCM_DO_BUILD_DURING_DEPLOYMENT=true
#   ENABLE_ORYX_BUILD=true
#   WEBSITE_RUN_FROM_PACKAGE  -> must NOT be set (would make wwwroot read-only)
# Startup command: npm start

on:
  workflow_dispatch:

concurrency:
  group: azure-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy source to Azure (Oryx builds on the server)
        uses: azure/webapps-deploy@v3
        with:
          app-name: medlynq-app
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: app
