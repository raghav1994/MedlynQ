name: Deploy MedLynQ to Azure

# Deploys the app SOURCE and lets Azure Oryx run `npm install && npm run build`
# on the server. This keeps wwwroot WRITABLE (the app writes compressed docs,
# mobile-pairing state, and PatientLog at runtime), which the standalone +
# run-from-package method does not allow.
#
# Requires these App Service settings (set via Azure CLI / Portal):
#   SCM_DO_BUILD_DURING_DEPLOYMENT=true
#   ENABLE_ORYX_BUILD=true
#   WEBSITE_RUN_FROM_PACKAGE  -> must NOT be set (would make wwwroot read-only)
# Startup command: npm start

on:
  push:
    branches: [main]
    paths-ignore:
      - 'app/python/**'
      - '.github/workflows/ocr-image.yml'
  workflow_dispatch:

concurrency:
  group: azure-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy source to Azure (Oryx builds on the server)
        uses: azure/webapps-deploy@v3
        with:
          app-name: medlynq-app
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: app
