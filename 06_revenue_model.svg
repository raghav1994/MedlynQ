<svg viewBox="0 0 1320 1660" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <title>MedLynq revenue model</title>
  <style>
    .t{fill:#1f1f1f;} .t2{fill:#555;} .t3{fill:#888;} .inv{fill:#fff;}
    .card{fill:#fff;stroke:#999;stroke-width:1.2;}
    .lane{fill:#fafafa;stroke:#d4d4d4;stroke-width:1;}
    .free{fill:#f6f6f4;stroke:#999;stroke-width:1.2;}
    .pro{fill:#fbeee8;stroke:#c96442;stroke-width:1.4;}
    .ent{fill:#1f1f1f;}
    .addon{fill:#eef2fa;stroke:#2566c8;stroke-width:1.2;}
    .perclaim{fill:#e8f5ee;stroke:#1f8a4c;stroke-width:1.3;}
    .accent{fill:#c96442;} .green{fill:#1f8a4c;} .blue{fill:#2566c8;}
    .title{font-size:18px;font-weight:700;}
    .lbl{font-size:12px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;fill:#555;}
    .h{font-size:13px;font-weight:600;}
    .sub{font-size:11px;}
    .tag{font-size:10px;}
    .micro{font-size:9px;}
    .big{font-size:24px;font-weight:700;}
    .medium{font-size:16px;font-weight:700;}
  </style>
  <rect width="1320" height="1660" fill="#fff"/>
  <text x="40" y="40" class="title t">MedLynq — revenue model</text>
  <text x="40" y="60" class="sub t2">Free hooks them. SaaS pays the salaries. Per-claim fees scale with NHCX. API license is the platform play.</text>
  <text x="40" y="100" class="lbl">1 · Pricing tiers (subscription)</text>
  <g transform="translate(40,118)"><rect class="free" width="220" height="380" rx="10"/><text x="20" y="34" class="h t">FREE</text><text x="20" y="68" class="big t">₹ 0</text><text x="20" y="84" class="sub t2">/ month · forever</text><text x="20" y="116" class="tag h t">WHO</text><text x="20" y="132" class="sub t2">Small hospitals · 1 user</text><text x="20" y="146" class="sub t2">Single scheme</text><text x="20" y="172" class="tag h t">WHAT THEY GET</text><text x="20" y="190" class="sub t2">• Patient folder</text><text x="20" y="206" class="sub t2">• Document repository</text><text x="20" y="222" class="sub t2">• Query tracker (manual)</text><text x="20" y="238" class="sub t2">• Aging alerts</text><text x="20" y="254" class="sub t2">• Basic checklist (1 scheme)</text><text x="20" y="270" class="sub t2">• Bulk download / zip</text><text x="20" y="296" class="tag h t">WHY WE OFFER IT</text><text x="20" y="314" class="sub t2">Data acquisition. Every query</text><text x="20" y="328" class="sub t2">logged here trains the classifier.</text><text x="20" y="350" class="tag h accent">Cost: ~₹200/hospital/month</text><text x="20" y="366" class="tag h accent">to run</text></g>
  <g transform="translate(276,118)"><rect class="pro" width="220" height="380" rx="10"/><text x="20" y="34" class="h accent">PROFESSIONAL</text><text x="20" y="68" class="big accent">₹ 5–8k</text><text x="20" y="84" class="sub t2">/ month</text><text x="20" y="116" class="tag h t">WHO</text><text x="20" y="132" class="sub t2">50–150 bed hospitals</text><text x="20" y="146" class="sub t2">Multi-user · all schemes</text><text x="20" y="172" class="tag h t">EVERYTHING IN FREE +</text><text x="20" y="190" class="sub t2">• Lynq query classifier</text><text x="20" y="206" class="sub t2">• Response drafter</text><text x="20" y="222" class="sub t2">• Document Evidence Locator</text><text x="20" y="238" class="sub t2">• Packet Builder</text><text x="20" y="254" class="sub t2">• Risk + approval predictor</text><text x="20" y="270" class="sub t2">• Settlement tracker (CFO lite)</text><text x="20" y="286" class="sub t2">• HIS connector (1 system)</text><text x="20" y="312" class="tag h t">SELL TO</text><text x="20" y="326" class="sub t2">TPA head · billing manager</text><text x="20" y="350" class="tag h accent">Annual contract value</text><text x="20" y="366" class="tag h accent">₹ 60k – 96k</text></g>
  <g transform="translate(512,118)"><rect class="ent" width="220" height="380" rx="10"/><text x="20" y="34" class="h inv">ENTERPRISE</text><text x="20" y="68" class="big inv">₹ 15–25k</text><text x="20" y="84" class="sub" fill="#aaa">/ month</text><text x="20" y="116" class="tag h inv">WHO</text><text x="20" y="132" class="sub" fill="#ddd">Hospital chains · 150+ beds</text><text x="20" y="146" class="sub" fill="#ddd">Multi-facility · API access</text><text x="20" y="172" class="tag h inv">EVERYTHING IN PRO +</text><text x="20" y="190" class="sub" fill="#ddd">• Multi-facility rollup</text><text x="20" y="206" class="sub" fill="#ddd">• All HIS connectors</text><text x="20" y="222" class="sub" fill="#ddd">• ERP / Tally sync</text><text x="20" y="238" class="sub" fill="#ddd">• Custom workflows</text><text x="20" y="254" class="sub" fill="#ddd">• Chrome extension (portals)</text><text x="20" y="270" class="sub" fill="#ddd">• Doctor co-pilot</text><text x="20" y="286" class="sub" fill="#ddd">• Dedicated success manager</text><text x="20" y="312" class="tag h inv">SELL TO</text><text x="20" y="326" class="sub" fill="#ddd">CFO · COO · IT director</text><text x="20" y="350" class="tag h" fill="#c96442">Annual contract value</text><text x="20" y="366" class="tag h" fill="#c96442">₹ 1.8 L – 3 L</text></g>
  <g transform="translate(748,118)"><rect class="addon" width="220" height="380" rx="10"/><text x="20" y="34" class="h blue">ANALYTICS ADD-ON</text><text x="20" y="68" class="big blue">₹ 10–25k</text><text x="20" y="84" class="sub t2">/ month · stacks on top</text><text x="20" y="116" class="tag h t">WHO</text><text x="20" y="132" class="sub t2">CFO · medical director</text><text x="20" y="146" class="sub t2">Hospitals with network access</text><text x="20" y="172" class="tag h t">WHAT THEY GET</text><text x="20" y="190" class="sub t2">• Network intelligence</text><text x="20" y="206" class="sub t2">• Denial pattern alerts</text><text x="20" y="222" class="sub t2">• Cross-hospital benchmarking</text><text x="20" y="238" class="sub t2">• Underpayment dispute engine</text><text x="20" y="254" class="sub t2">• CFO mobile push digest</text><text x="20" y="270" class="sub t2">• Quarterly insight reports</text><text x="20" y="286" class="sub t2">• Approval gap analytics</text><text x="20" y="312" class="tag h t">UNLOCKED AT</text><text x="20" y="326" class="sub t2">≥ 25 hospitals on network</text><text x="20" y="350" class="tag h blue">Annual contract value</text><text x="20" y="366" class="tag h blue">₹ 1.2 L – 3 L</text></g>
  <g transform="translate(984,118)"><rect class="addon" width="220" height="380" rx="10"/><text x="20" y="34" class="h blue">INSURER MIRROR</text><text x="20" y="68" class="big blue">₹ 50k–2L</text><text x="20" y="84" class="sub t2">/ month · per TPA</text><text x="20" y="116" class="tag h t">WHO</text><text x="20" y="132" class="sub t2">TPAs · insurance companies</text><text x="20" y="146" class="sub t2">Public sector payers</text><text x="20" y="172" class="tag h t">WHAT THEY GET</text><text x="20" y="190" class="sub t2">• Read-only case mirror</text><text x="20" y="206" class="sub t2">• Inline query raising</text><text x="20" y="222" class="sub t2">• Faster query resolution</text><text x="20" y="238" class="sub t2">• Auditor share link</text><text x="20" y="254" class="sub t2">• Aggregate analytics</text><text x="20" y="270" class="sub t2">• White-label option</text><text x="20" y="296" class="tag h t">WHY THIS MATTERS</text><text x="20" y="312" class="sub t2">Two-sided network</text><text x="20" y="326" class="sub t2">Real moat upgrade</text><text x="20" y="350" class="tag h blue">Annual contract value</text><text x="20" y="366" class="tag h blue">₹ 6 L – 24 L per TPA</text></g>
  <text x="40" y="538" class="lbl">2 · Usage / transaction fees (scales with volume)</text>
  <g transform="translate(40,556)"><rect class="perclaim" width="394" height="200" rx="10"/><text x="20" y="34" class="h green">NHCX submission fee</text><text x="20" y="68" class="big green">₹ 50–150</text><text x="20" y="84" class="sub t2">per claim · post-NHCX-mandate</text><text x="20" y="116" class="tag h t">TRIGGERS WHEN</text><text x="20" y="134" class="sub t2">NHCX becomes mandatory for govt schemes</text><text x="20" y="150" class="sub t2">(expected 2026–2027)</text><text x="20" y="172" class="tag h t">UNIT ECONOMICS</text><text x="20" y="190" class="sub t2">Avg hospital · 500 claims/mo · ₹50k MRR add</text></g>
  <g transform="translate(454,556)"><rect class="perclaim" width="394" height="200" rx="10"/><text x="20" y="34" class="h green">HIS API license</text><text x="20" y="68" class="big green">₹ 20–30</text><text x="20" y="84" class="sub t2">per claim · white-label to HIS vendors</text><text x="20" y="116" class="tag h t">WHO PAYS</text><text x="20" y="134" class="sub t2">Practo · Insta · eHospital · custom HIS</text><text x="20" y="150" class="sub t2">They embed Lynq inside their product</text><text x="20" y="172" class="tag h t">UNIT ECONOMICS</text><text x="20" y="190" class="sub t2">1 HIS vendor = 200+ hospitals = ₹5L+ MRR</text></g>
  <g transform="translate(868,556)"><rect class="perclaim" width="336" height="200" rx="10"/><text x="20" y="34" class="h green">Data licensing</text><text x="20" y="68" class="big green">₹ 5–25 L</text><text x="20" y="84" class="sub t2">per annual licence · de-identified</text><text x="20" y="116" class="tag h t">WHO PAYS</text><text x="20" y="134" class="sub t2">Researchers · pharma · government</text><text x="20" y="150" class="sub t2">policy bodies (IRDAI, NHA)</text><text x="20" y="172" class="tag h t">UNIT ECONOMICS</text><text x="20" y="190" class="sub t2">India's only claims AI corpus</text></g>
  <text x="40" y="796" class="lbl">3 · How one enterprise hospital pays us (typical mix)</text>
  <g transform="translate(40,814)"><rect class="lane" width="1240" height="200" rx="8"/><text x="14" y="26" class="h t">Hospital · 200 beds · 800 claims/month · pre-NHCX</text>
    <g transform="translate(14,40)"><rect class="pro" width="200" height="60" rx="6"/><text x="10" y="20" class="sub h t">Enterprise tier</text><text x="10" y="36" class="big accent">₹ 20 k</text><text x="10" y="50" class="micro t2">SaaS · monthly</text></g>
    <g transform="translate(228,40)"><rect class="addon" width="200" height="60" rx="6"/><text x="10" y="20" class="sub h t">Analytics add-on</text><text x="10" y="36" class="big blue">₹ 18 k</text><text x="10" y="50" class="micro t2">CFO + network</text></g>
    <g transform="translate(442,40)"><rect class="addon" width="200" height="60" rx="6"/><text x="10" y="20" class="sub h t">Doctor co-pilot</text><text x="10" y="36" class="big blue">₹ 12 k</text><text x="10" y="50" class="micro t2">Per facility</text></g>
    <g transform="translate(656,40)"><rect class="perclaim" width="200" height="60" rx="6"/><text x="10" y="20" class="sub h t">NHCX per claim</text><text x="10" y="36" class="big green">₹ 0</text><text x="10" y="50" class="micro t2">Pre-mandate · zero</text></g>
    <g transform="translate(870,40)"><rect class="card" width="200" height="60" rx="6"/><text x="10" y="20" class="sub h t">TOTAL MRR</text><text x="10" y="36" class="big t">₹ 50 k</text><text x="10" y="50" class="micro t2">₹ 6 L ACV</text></g>
    <text x="14" y="124" class="h t">Same hospital · post-NHCX-mandate (year 3)</text>
    <g transform="translate(14,140)"><rect class="pro" width="200" height="44" rx="6"/><text x="10" y="20" class="sub h t">Enterprise tier</text><text x="10" y="36" class="sub h accent">₹ 25 k</text></g>
    <g transform="translate(228,140)"><rect class="addon" width="200" height="44" rx="6"/><text x="10" y="20" class="sub h t">Analytics add-on</text><text x="10" y="36" class="sub h blue">₹ 25 k</text></g>
    <g transform="translate(442,140)"><rect class="addon" width="200" height="44" rx="6"/><text x="10" y="20" class="sub h t">Doctor co-pilot</text><text x="10" y="36" class="sub h blue">₹ 15 k</text></g>
    <g transform="translate(656,140)"><rect class="perclaim" width="200" height="44" rx="6"/><text x="10" y="20" class="sub h t">NHCX 800 × ₹100</text><text x="10" y="36" class="sub h green">₹ 80 k</text></g>
    <g transform="translate(870,140)"><rect class="card" width="200" height="44" rx="6"/><text x="10" y="20" class="sub h t">TOTAL MRR</text><text x="10" y="36" class="sub h t">₹ 1.45 L</text></g>
  </g>
  <text x="40" y="1054" class="lbl">4 · 24-month revenue projection (conservative)</text>
  <g transform="translate(40,1072)"><rect class="lane" width="1240" height="280" rx="8"/>
    <g transform="translate(20,20)"><line x1="40" y1="220" x2="1200" y2="220" stroke="#888"/><line x1="40" y1="20" x2="40" y2="220" stroke="#888"/><text x="6" y="222" class="micro t3">0</text><text x="6" y="180" class="micro t3">5L</text><text x="6" y="138" class="micro t3">15L</text><text x="6" y="96" class="micro t3">25L</text><text x="6" y="54" class="micro t3">35L</text><text x="6" y="32" class="micro t3">₹MRR</text>
      <g transform="translate(60,0)"><rect x="0" y="216" width="38" height="4" class="accent"/><text x="19" y="234" class="micro t3" text-anchor="middle">M3</text><text x="19" y="212" class="micro t2" text-anchor="middle">₹0.3L</text><text x="19" y="198" class="micro t3" text-anchor="middle">3 free</text></g>
      <g transform="translate(160,0)"><rect x="0" y="206" width="38" height="14" class="accent"/><text x="19" y="234" class="micro t3" text-anchor="middle">M6</text><text x="19" y="202" class="micro t2" text-anchor="middle">₹0.6L</text><text x="19" y="188" class="micro t3" text-anchor="middle">10 hospitals</text></g>
      <g transform="translate(260,0)"><rect x="0" y="200" width="38" height="20" class="accent"/><text x="19" y="234" class="micro t3" text-anchor="middle">M9</text><text x="19" y="196" class="micro t2" text-anchor="middle">₹1.2L</text></g>
      <g transform="translate(360,0)"><rect x="0" y="180" width="38" height="40" class="accent"/><text x="19" y="234" class="micro t3" text-anchor="middle">M12</text><text x="19" y="176" class="micro t2" text-anchor="middle">₹2L</text><text x="19" y="162" class="micro t3" text-anchor="middle">25 hospitals</text></g>
      <g transform="translate(460,0)"><rect x="0" y="160" width="38" height="60" class="accent"/><rect x="0" y="155" width="38" height="5" class="blue"/><text x="19" y="234" class="micro t3" text-anchor="middle">M15</text><text x="19" y="151" class="micro t2" text-anchor="middle">₹3.5L</text></g>
      <g transform="translate(560,0)"><rect x="0" y="138" width="38" height="82" class="accent"/><rect x="0" y="124" width="38" height="14" class="blue"/><text x="19" y="234" class="micro t3" text-anchor="middle">M18</text><text x="19" y="120" class="micro t2" text-anchor="middle">₹6L</text><text x="19" y="106" class="micro t3" text-anchor="middle">60 hospitals</text></g>
      <g transform="translate(660,0)"><rect x="0" y="106" width="38" height="114" class="accent"/><rect x="0" y="88" width="38" height="18" class="blue"/><text x="19" y="234" class="micro t3" text-anchor="middle">M21</text><text x="19" y="84" class="micro t2" text-anchor="middle">₹13L</text></g>
      <g transform="translate(760,0)"><rect x="0" y="80" width="38" height="140" class="accent"/><rect x="0" y="56" width="38" height="24" class="blue"/><rect x="0" y="42" width="38" height="14" class="green"/><text x="19" y="234" class="micro t3" text-anchor="middle">M24</text><text x="19" y="38" class="micro t2" text-anchor="middle">₹25L</text><text x="19" y="24" class="micro t3" text-anchor="middle">120 hosp</text></g>
      <g transform="translate(900,20)"><rect class="accent" x="0" y="0" width="12" height="12"/><text x="20" y="10" class="micro t2">SaaS (tiers + add-ons)</text><rect class="blue" x="0" y="20" width="12" height="12"/><text x="20" y="30" class="micro t2">Analytics + Insurer Mirror</text><rect class="green" x="0" y="40" width="12" height="12"/><text x="20" y="50" class="micro t2">Per-claim NHCX fees</text></g>
      <text x="900" y="86" class="micro t3">Note: NHCX revenue switches on at M22-24,</text><text x="900" y="100" class="micro t3">assuming mandate timeline holds.</text><text x="900" y="122" class="micro accent">M24 ARR ≈ ₹3 crore · run rate</text><text x="900" y="138" class="micro accent">M36 target ≈ ₹15+ crore ARR</text>
    </g>
  </g>
  <text x="40" y="1392" class="lbl">5 · Unit economics</text>
  <g transform="translate(40,1410)"><rect class="card" width="394" height="100" rx="8"/><text x="14" y="22" class="h t">Cost per hospital · per month</text><text x="14" y="42" class="sub t2">Infra (Postgres + S3 + LLM API) · ₹ 1.5 k</text><text x="14" y="58" class="sub t2">Support + onboarding (amortised) · ₹ 1 k</text><text x="14" y="74" class="sub t2">Sales commission · ₹ 2 k</text><text x="14" y="92" class="sub h accent">Total: ~₹ 4.5 k / hospital / month</text></g>
  <g transform="translate(454,1410)"><rect class="card" width="394" height="100" rx="8"/><text x="14" y="22" class="h t">Gross margin · per tier</text><text x="14" y="42" class="sub t2">Free · negative ₹ 1.5 k (loss leader)</text><text x="14" y="58" class="sub t2">Pro (₹ 7 k) · ~ 35 % margin</text><text x="14" y="74" class="sub t2">Enterprise (₹ 20 k) · ~ 75 % margin</text><text x="14" y="92" class="sub h accent">Blended target: 60 %+ gross margin</text></g>
  <g transform="translate(868,1410)"><rect class="card" width="336" height="100" rx="8"/><text x="14" y="22" class="h t">Payback + CAC</text><text x="14" y="42" class="sub t2">Avg CAC: ₹ 60 k (sales + onboarding)</text><text x="14" y="58" class="sub t2">Avg ACV: ₹ 2.5 L → payback ~ 4 months</text><text x="14" y="74" class="sub t2">Churn target: &lt; 8 % annually</text><text x="14" y="92" class="sub h accent">LTV / CAC ≈ 8×</text></g>
  <text x="40" y="1552" class="lbl">Reading guide</text>
  <g transform="translate(40,1568)"><rect width="1240" height="76" rx="8" fill="#fff" stroke="#d4d4d4"/><text x="14" y="22" class="h t">Five revenue streams · stacked, not exclusive</text><text x="14" y="40" class="sub t2">SaaS tiers (Free → Pro → Enterprise) — the predictable base. CFO-grade add-ons stack on top. Insurer mirror sells to the other side of the market.</text><text x="14" y="56" class="sub t2">Per-claim NHCX fees and HIS API license scale with volume — those are the lines that bend the ARR curve upward in years 2–3.</text><text x="14" y="72" class="sub t2">Data licensing is a high-margin sleeper · only viable once the corpus is large and consent-clean.</text></g>
</svg>
